services:
  go:
    build:
      context: .
      dockerfile: ./Dockerfile
    user: "0:0"
    group_add:
      - "968"
    ports:
      - 8080:8080
    networks:
      - api-culteur-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:Z
    restart: on-failure
    security_opt:
      - label=disable
networks:
  api-culteur-network:
    external: true
